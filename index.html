<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LISSA | Masuk</title>
    <meta name="description" content="Login ke LISSA" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-in {
        animation: fadeIn 0.6s ease-out both;
      }
      .animate-in-delay {
        animation: fadeIn 0.6s ease-out 0.15s both;
      }
      .animate-in-delay-2 {
        animation: fadeIn 0.6s ease-out 0.3s both;
      }
    </style>
  </head>
  <body class="min-h-screen flex bg-white">
    <!-- Left Panel — Gradient Illustration -->
    <div class="hidden lg:flex lg:w-[45%] relative overflow-hidden">
      <div
        class="absolute inset-0 bg-gradient-to-br from-teal-100 via-cyan-50 to-white"
      ></div>
      <div
        class="absolute top-1/4 -left-20 w-96 h-96 bg-teal-200/40 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute bottom-1/4 right-10 w-72 h-72 bg-cyan-200/30 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute top-1/2 left-1/3 w-48 h-48 bg-teal-300/20 rounded-full blur-2xl"
      ></div>
    </div>

    <!-- Right Panel — Login Form -->
    <div class="flex-1 flex items-center justify-center px-6 py-12 lg:px-16">
      <div class="w-full max-w-md space-y-8">
        <!-- Logo & Header -->
        <div class="text-center animate-in">
          <img
            src="logo-lissa.png"
            alt="LISSA"
            class="w-20 h-20 mx-auto object-contain mb-3"
          />
          <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
            LISSA
          </h1>
        </div>

        <!-- Form -->
        <form onsubmit="handleLogin(event)" class="space-y-5 animate-in-delay">
          <div>
            <label
              for="username"
              class="block text-sm font-semibold text-slate-700 mb-1.5"
              >Username</label
            >
            <input
              id="username"
              type="text"
              required
              placeholder="Masukkan username"
              class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition-all"
            />
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="text-sm font-semibold text-slate-700"
                >Password</label
              >
              <a
                href="#"
                class="text-sm font-medium text-teal-600 hover:text-teal-700 transition-colors"
                >Lupa Password?</a
              >
            </div>
            <div class="relative">
              <input
                id="password"
                type="password"
                required
                placeholder="Masukkan password"
                class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition-all pr-12"
              />
              <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
              >
                <span id="eye-icon" class="material-symbols-outlined text-xl"
                  >visibility_off</span
                >
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="w-full py-3.5 bg-gradient-to-r from-teal-500 to-cyan-500 text-white font-semibold rounded-xl shadow-lg shadow-teal-200/50 hover:shadow-xl hover:shadow-teal-300/40 hover:from-teal-600 hover:to-cyan-600 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          >
            Masuk
            <span class="material-symbols-outlined text-lg">login</span>
          </button>
        </form>
        <!-- Footer -->
        <p class="text-center text-xs text-slate-400 animate-in-delay-2">
          &copy; 2026 PLN Indonesia — Beyond Electricity Marketing with AI
        </p>
      </div>
    </div>

    <script>
      function togglePassword() {
        const pw = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        if (pw.type === "password") {
          pw.type = "text";
          icon.textContent = "visibility";
        } else {
          pw.type = "password";
          icon.textContent = "visibility_off";
        }
      }

      function handleLogin(event) {
        event.preventDefault(); // Mencegah form submit beneran

        // Ambil nilai dari input
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // Database statis (Sesuai list Anda)
        const users = {
          "nurul.aini": { pass: "P@ssw0rd", role: "PP ULP" },
          "noor.saadillah": { pass: "P@ssw0rd", role: "Teknik ULP" },
          "dian.cahyu": { pass: "P@ssw0rd", role: "NPS" },
          natalia: { pass: "P@ssw0rd", role: "Perencanaan" },
          "taufan.yoga": { pass: "P@ssw0rd", role: "Konstruksi" },
          "puji.gunadi": { pass: "P@ssw0rd", role: "Jaringan" },
          manajemen: { pass: "P@ssw0rd", role: "Manajemen" },
        };

        // Validasi
        if (users[user] && users[user].pass === pass) {
          // Simpan info ke session (Opsional, agar dashboard bisa tahu siapa yang login)
          localStorage.setItem("userName", user);
          localStorage.setItem("userRole", users[user].role);

          alert("Login Berhasil sebagai " + users[user].role);
          window.location.href = "dashboard.html"; // Redirect ke dashboard
        } else {
          alert("Username atau Password Salah!");
        }
      }
    </script>
  </body>
</html>
