<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BESTIE | Masuk</title>
    <meta
      name="description"
      content="Login ke BESTIE — Beyond Electricity Marketing with AI-based Customer Profiling Management"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-in {
        animation: fadeIn 0.6s ease-out both;
      }
      .animate-in-delay {
        animation: fadeIn 0.6s ease-out 0.15s both;
      }
      .animate-in-delay-2 {
        animation: fadeIn 0.6s ease-out 0.3s both;
      }
    </style>
  </head>
  <body class="min-h-screen flex bg-white">
    <!-- Left Panel — Gradient Illustration -->
    <div class="hidden lg:flex lg:w-[45%] relative overflow-hidden">
      <div
        class="absolute inset-0 bg-gradient-to-br from-teal-100 via-cyan-50 to-white"
      ></div>
      <div
        class="absolute top-1/4 -left-20 w-96 h-96 bg-teal-200/40 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute bottom-1/4 right-10 w-72 h-72 bg-cyan-200/30 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute top-1/2 left-1/3 w-48 h-48 bg-teal-300/20 rounded-full blur-2xl"
      ></div>
    </div>

    <!-- Right Panel — Login Form -->
    <div class="flex-1 flex items-center justify-center px-6 py-12 lg:px-16">
      <div class="w-full max-w-md space-y-8">
        <!-- Logo & Header -->
        <div class="text-center animate-in">
          <img
            src="logo-lissa.png"
            alt="BESTIE"
            class="w-20 h-20 mx-auto object-contain mb-3"
          />
          <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
            BESTIE
          </h1>
          <p class="text-sm text-slate-500 mt-1 leading-relaxed">
            Beyond Electricity Marketing with AI-based<br />Customer Profiling
            Management
          </p>
        </div>

        <!-- Form -->
        <div class="space-y-5 animate-in-delay">
          <!-- Email -->
          <div>
            <label
              for="email"
              class="block text-sm font-semibold text-slate-700 mb-1.5"
              >Email</label
            >
            <input
              id="email"
              type="email"
              placeholder="nama@pln.co.id"
              class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition-all"
            />
          </div>
          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="text-sm font-semibold text-slate-700"
                >Password</label
              >
              <a
                href="#"
                class="text-sm font-medium text-teal-600 hover:text-teal-700 transition-colors"
                >Lupa Password?</a
              >
            </div>
            <div class="relative">
              <input
                id="password"
                type="password"
                placeholder="Masukkan password"
                class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition-all pr-12"
              />
              <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
              >
                <span id="eye-icon" class="material-symbols-outlined text-xl"
                  >visibility_off</span
                >
              </button>
            </div>
          </div>
          <!-- Submit -->
          <button
            onclick="window.location.href = 'dashboard.html'"
            class="w-full py-3.5 bg-gradient-to-r from-teal-500 to-cyan-500 text-white font-semibold rounded-xl shadow-lg shadow-teal-200/50 hover:shadow-xl hover:shadow-teal-300/40 hover:from-teal-600 hover:to-cyan-600 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          >
            Masuk
            <span class="material-symbols-outlined text-lg">login</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="relative animate-in-delay-2">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="bg-white px-4 text-xs font-medium text-slate-400"
              >Single Sign On</span
            >
          </div>
        </div>

        <!-- SSO -->
        <div class="animate-in-delay-2">
          <button
            class="w-full flex items-center justify-center gap-3 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition-all"
          >
            <img
              src="logo-bestie.jpg"
              alt="PLN"
              class="w-6 h-6 object-contain"
            />
            <span class="font-semibold text-sm text-slate-700"
              >SSO PLN Indonesia</span
            >
          </button>
        </div>

        <!-- Info Box -->
        <div
          class="bg-teal-50 border border-teal-100 rounded-xl px-4 py-3 flex items-start gap-3 animate-in-delay-2"
        >
          <span class="material-symbols-outlined text-teal-600 text-lg mt-0.5"
            >info</span
          >
          <p class="text-xs text-teal-800 leading-relaxed">
            Akses terbatas untuk karyawan PLN Indonesia.<br />Gunakan kredensial
            resmi Anda untuk masuk.
          </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-400 animate-in-delay-2">
          &copy; 2026 PLN Indonesia — Beyond Electricity Marketing with AI
        </p>
      </div>
    </div>

    <script>
      function togglePassword() {
        const pw = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        if (pw.type === "password") {
          pw.type = "text";
          icon.textContent = "visibility";
        } else {
          pw.type = "password";
          icon.textContent = "visibility_off";
        }
      }
    </script>
  </body>
</html>
